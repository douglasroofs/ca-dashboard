<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Douglas Roofing - CA by Month</title><style>
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f6f9;color:#0f2438}
header{background:#0f2438;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
header h1{font-size:17px;margin:0;font-weight:600}
header h1 span{color:#8aa0b6;font-weight:400;font-size:13px}
.hd{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.meta{font-size:12px;color:#aebfd2}
.toggle{display:inline-flex;background:#1c3450;border-radius:8px;overflow:hidden}
.toggle button{background:transparent;color:#aebfd2;border:none;padding:7px 14px;font-size:13px;cursor:pointer}
.toggle button.on{background:#1f6feb;color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:22px}
button#rf{background:#1f6feb;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e9f0;border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:10px 12px;font-size:14px;border-bottom:1px solid #eef1f6;white-space:nowrap}
th{background:#fafbfc;color:#6b7888;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.num{text-align:right;font-variant-numeric:tabular-nums}
.rank{color:#9aa6b4;width:28px}
.rep{font-weight:500}
.tot{font-weight:700;background:#f3f7ff}
th.tot{background:#e9f1ff}
tbody tr:hover{background:#fafcff}
tfoot td{font-weight:700;background:#fafbfc;border-top:2px solid #e5e9f0}
.state{padding:30px;text-align:center;color:#6b7888}
.note{color:#6b7888;font-size:12px;margin:8px 2px 0}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin:0 8px}.nav a{color:#aebfd2;text-decoration:none;font-size:13px;padding:5px 10px;border-radius:6px}.nav a.on{background:#1f6feb;color:#fff}.nav a:hover{color:#fff}
</style></head><body>
<header>
  <h1>Douglas Roofing - CA by Month <span>(ICA + SGCA, Storm teams)</span></h1><nav class="nav"><a href="/revenue.html">Herndon</a><a href="/richmond.html">Richmond</a><a class="on" href="/ca-bonus.html">CA by Month</a></nav>
  <div class="hd">
    <div class="toggle"><button data-office="herndon" class="on">Herndon</button><button data-office="richmond">Richmond</button></div>
    <span class="meta" id="upd"></span>
    <button id="rf">Refresh</button>
  </div>
</header>
<div class="wrap">
  <div id="tw"><div class="state">Loading...</div></div>
  <div class="note">CA = SalesRabbit pins set to ICA or SGCA, counted in the month the status was set. Scope: Herndon = DC Self Gen, Richmond = Richmond Storm.</div>
</div>
<script>
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var office='herndon';
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function load(){
  var b=document.getElementById('rf');b.disabled=true;
  document.getElementById('tw').innerHTML='<div class="state">Computing... (~5s)</div>';
  fetch('/api/ca-history?office='+office+'&live=1&t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){
    if(d.error)throw new Error(d.error);
    document.getElementById('upd').textContent='Updated '+new Date(d.updated||Date.now()).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    var months=d.months||[];var reps=d.reps||[];
    var head='<tr><th class="rank">#</th><th class="rep">Rep</th>'+months.map(function(m){return '<th class="num">'+MONTHS[m]+'</th>'}).join('')+'<th class="num tot">YTD</th></tr>';
    var colTotals=months.map(function(){return 0});var grand=0;
    var rows=reps.map(function(r,i){
      (r.counts||[]).forEach(function(c,idx){colTotals[idx]+=c});grand+=r.total;
      return '<tr><td class="rank">'+(i+1)+'</td><td class="rep">'+esc(r.rep)+'</td>'+(r.counts||[]).map(function(c){return '<td class="num">'+c+'</td>'}).join('')+'<td class="num tot">'+r.total+'</td></tr>';
    }).join('');
    var foot='<tr><td></td><td class="rep">Team total</td>'+colTotals.map(function(c){return '<td class="num">'+c+'</td>'}).join('')+'<td class="num tot">'+grand+'</td></tr>';
    document.getElementById('tw').innerHTML='<table><thead>'+head+'</thead><tbody>'+rows+'</tbody><tfoot>'+foot+'</tfoot></table>';
  }).catch(function(e){document.getElementById('tw').innerHTML='<div class="state" style="color:#b42318">Could not load: '+esc(String(e.message||e))+'</div>'}).then(function(){b.disabled=false});
}
[].slice.call(document.querySelectorAll('.toggle button')).forEach(function(btn){btn.addEventListener('click',function(){office=btn.getAttribute('data-office');[].slice.call(document.querySelectorAll('.toggle button')).forEach(function(x){x.classList.remove('on')});btn.classList.add('on');load();});});
document.getElementById('rf').addEventListener('click',load);
load();
</script>
</body></html>
