<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Douglas Roofing - Revenue MTD</title><style>
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f6f9;color:#0f2438}
header{background:#0f2438;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:17px;margin:0;font-weight:600}
.meta{font-size:12px;color:#aebfd2}
.wrap{max-width:960px;margin:0 auto;padding:22px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
@media(max-width:600px){.cards{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:20px}
.card .label{font-size:12px;color:#6b7888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.card .value{font-size:32px;font-weight:700}
.card .sub{font-size:12px;color:#6b7888;margin-top:6px}
.a{border-top:3px solid #1f6feb}.c{border-top:3px solid #1a7f37}
h2{font-size:15px;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e9f0;border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:11px 15px;font-size:14px;border-bottom:1px solid #eef1f6}
th{background:#fafbfc;color:#6b7888;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.num{text-align:right;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.rank{color:#9aa6b4;width:34px}
button{background:#1f6feb;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer}
.state{padding:36px;text-align:center;color:#6b7888}
</style></head><body>
<header><h1>Douglas Roofing - Revenue (Month to Date)</h1><div style="display:flex;gap:12px;align-items:center"><span class="meta" id="upd"></span><button id="rf">Refresh</button></div></header>
<div class="wrap">
<div class="cards">
<div class="card a"><div class="label">Approved</div><div class="value" id="ap">-</div><div class="sub">Job awarded date</div></div>
<div class="card c"><div class="label">Contract Signed</div><div class="value" id="cn">-</div><div class="sub">Contract signed date</div></div>
</div>
<h2>Rep Leaderboard <span style="color:#6b7888;font-weight:400">(by Contract Signed)</span></h2>
<div id="tw"><div class="state">Loading...</div></div>
</div>
<script>
var fmt=function(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function load(){
var b=document.getElementById('rf');b.disabled=true;
document.getElementById('tw').innerHTML='<div class="state">Loading...</div>';
fetch('/api/revenue',{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){
if(d.error)throw new Error(d.error);
document.getElementById('ap').textContent=fmt(d.company.approved_amount);
document.getElementById('cn').textContent=fmt(d.company.contract_amount);
document.getElementById('upd').textContent='Updated '+new Date(d.updated||Date.now()).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
var rows=(d.reps||[]).map(function(r,i){return '<tr><td class="rank">'+(i+1)+'</td><td>'+esc(r.rep)+'</td><td class="num">'+fmt(r.approved_amount)+'</td><td class="num" style="font-weight:600">'+fmt(r.contract_amount)+'</td></tr>'}).join('');
document.getElementById('tw').innerHTML='<table><thead><tr><th class="rank">#</th><th>Rep</th><th class="num">Approved</th><th class="num">Contract Signed</th></tr></thead><tbody>'+rows+'</tbody></table>';
}).catch(function(e){document.getElementById('tw').innerHTML='<div class="state" style="color:#b42318">Could not load: '+esc(String(e.message||e))+'</div>'}).then(function(){b.disabled=false});
}
document.getElementById('rf').addEventListener('click',load);load();
</script>
</body></html>
