<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Douglas Roofing - Dashboard</title><style>
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f6f9;color:#0f2438}
header{background:#0f2438;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:17px;margin:0;font-weight:600}
.meta{font-size:12px;color:#aebfd2}
.wrap{max-width:1040px;margin:0 auto;padding:22px}
.cards{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:22px}
@media(max-width:780px){.cards{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.cards{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:16px 18px}
.card .label{font-size:12px;color:#6b7888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card .value{font-size:26px;font-weight:700}
.card .sub{font-size:11px;color:#6b7888;margin-top:6px}
.d{border-top:3px solid #7c3aed}.k{border-top:3px solid #b8860b}.a{border-top:3px solid #1f6feb}.c{border-top:3px solid #1a7f37}
h2{font-size:15px;margin:24px 0 12px}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e9f0;border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:11px 14px;font-size:14px;border-bottom:1px solid #eef1f6}
th{background:#fafbfc;color:#6b7888;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.num{text-align:right;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.rank{color:#9aa6b4;width:30px}
button{background:#1f6feb;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer}
.state{padding:30px;text-align:center;color:#6b7888}
tfoot td{font-weight:700;background:#fafbfc;border-top:2px solid #e5e9f0}
.hd{display:flex;gap:12px;align-items:center}
</style></head><body>
<header><h1>Douglas Roofing - DC Dashboard (Month to Date)</h1><div class="hd"><span class="meta" id="upd"></span><button id="rf">Refresh</button><button id="ud" style="background:#475569" title="Recompute doors live from Sales Rabbit (~25s). The 7am refresh saves it automatically.">Update doors now</button></div></header>
<div class="wrap">
<div class="cards">
<div class="card d"><div class="label">Doors Knocked</div><div class="value" id="cDr">-</div><div class="sub">Pins this month</div></div>
<div class="card k"><div class="label">CAs</div><div class="value" id="cCa">-</div><div class="sub" id="caUpd">Documents named "CA" this month</div></div>
<div class="card a"><div class="label">Approved Revenue</div><div class="value" id="cAp">-</div><div class="sub">Job awarded date</div></div>
<div class="card c"><div class="label">Contract Signed Revenue</div><div class="value" id="cCn">-</div><div class="sub">Contract signed date</div></div>
</div>
<h2>Rep Leaderboard <span style="color:#6b7888;font-weight:400">(by Contract Signed)</span></h2>
<div id="tw"><div class="state">Loading...</div></div>
</div>
<script>
var fmt=function(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function norm(s){return String(s||'').trim().toLowerCase().replace(/\s+/g,' ')}
function load(){
var b=document.getElementById('rf');b.disabled=true;var ud=document.getElementById('ud');if(ud){ud.disabled=true;ud.textContent=window.__liveDoors?'Updating doors\u2026 (~25s)':'Update doors now';}
document.getElementById('tw').innerHTML='<div class="state">Loading...</div>';
Promise.all([
  fetch('/api/revenue',{cache:'no-store'}).then(function(r){return r.json()}),
  fetch('/api/ca',{cache:'no-store'}).then(function(r){return r.json()}).catch(function(){return {reps:[],total:0}}),
  fetch((window.__liveDoors?'/api/doors?live=1':'/api/doors'),{cache:'no-store'}).then(function(r){return r.json()}).catch(function(){return {reps:[],total:0,roster:[],allowedReps:[]}})
]).then(function(res){
var rev=res[0], ca=res[1], dr=res[2];
if(rev.error)throw new Error(rev.error);
document.getElementById('upd').textContent='Updated '+new Date(rev.updated||Date.now()).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
if(ca.updated)document.getElementById('caUpd').textContent='Documents named "CA" · as of '+ca.updated;
var ALIAS={'mike mccarthy':'michael mccarthy','izzy price':'isabelle price','robert mumford-wilson':'robert wilson'};
function dkey(n){var x=norm(n);return ALIAS[x]||x}
var map={};
(rev.reps||[]).forEach(function(r){map[norm(r.rep)]={rep:r.rep,approved:r.approved_amount||0,contract:r.contract_amount||0,cas:0,doors:0}});
(ca.reps||[]).forEach(function(c){var k=dkey(c.rep);if(map[k]){map[k].cas=c.count}else{map[k]={rep:c.rep,approved:0,contract:0,cas:c.count,doors:0}}});
(dr.reps||[]).forEach(function(d){var k=dkey(d.rep);if(map[k]){map[k].doors=d.doors}else{map[k]={rep:d.rep,approved:0,contract:0,cas:0,doors:d.doors}}});
(dr.roster||[]).forEach(function(nm){var k=dkey(nm);if(!map[k]){map[k]={rep:nm,approved:0,contract:0,cas:0,doors:0}}});
var rowsArr=Object.keys(map).map(function(k){return map[k]});
rowsArr=rowsArr.filter(function(r){var n=norm(r.rep);return !(n.indexOf('haley')>-1||n==='adam mulvaney'||n==='unassigned')});
var allowSet=new Set(dr.allowedReps||[]);if(allowSet.size){rowsArr=rowsArr.filter(function(r){return allowSet.has(dkey(r.rep))})}
rowsArr.sort(function(a,b){return (b.contract-a.contract)||(b.approved-a.approved)||(b.doors-a.doors)});
var tD=0,tC=0,tAp=0,tCn=0;
rowsArr.forEach(function(r){tD+=(r.doors||0);tC+=(r.cas||0);tAp+=(r.approved||0);tCn+=(r.contract||0)});
document.getElementById('cDr').textContent=tD;
document.getElementById('cCa').textContent=tC;
document.getElementById('cAp').textContent=fmt(tAp);
document.getElementById('cCn').textContent=fmt(tCn);
var rows=rowsArr.map(function(r,i){return '<tr><td class="rank">'+(i+1)+'</td><td>'+esc(r.rep)+'</td><td class="num">'+(r.doors||0)+'</td><td class="num">'+(r.cas||0)+'</td><td class="num">'+fmt(r.approved)+'</td><td class="num" style="font-weight:600">'+fmt(r.contract)+'</td></tr>'}).join('');
document.getElementById('tw').innerHTML='<table><thead><tr><th class="rank">#</th><th>Rep</th><th class="num">Doors</th><th class="num">CAs</th><th class="num">Approved</th><th class="num">Contract Signed</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr><td></td><td>Total</td><td class="num">'+tD+'</td><td class="num">'+tC+'</td><td class="num">'+fmt(tAp)+'</td><td class="num">'+fmt(tCn)+'</td></tr></tfoot></table>';
}).catch(function(e){document.getElementById('tw').innerHTML='<div class="state" style="color:#b42318">Could not load: '+esc(String(e.message||e))+'</div>'}).then(function(){b.disabled=false;var ud=document.getElementById('ud');if(ud){ud.disabled=false;ud.textContent='Update doors now';}window.__liveDoors=false;});
}
document.getElementById('rf').addEventListener('click',function(){window.__liveDoors=false;load();});var _ud=document.getElementById('ud');if(_ud)_ud.addEventListener('click',function(){window.__liveDoors=true;load();});load();
</script>
</body></html>
